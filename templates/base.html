<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="{% block description %}Personal website — projects, blog, experiments{% endblock %}" />
    <title>{% block title %}arseniy{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="container nav">
        <a href="/" class="brand">arseniy</a>
        <ul class="nav-links">
          <li><a href="/projects" {% if active == 'projects' %}class="active"{% endif %}>projects</a></li>
          <li><a href="/blog" {% if active == 'blog' %}class="active"{% endif %}>blog</a></li>
        </ul>
      </nav>
    </header>

    {% if breadcrumbs %}
    <div class="breadcrumb-bar">
      <div class="container breadcrumbs">
        <a href="/">home</a>
        {% for crumb in breadcrumbs %}
          <span class="bc-sep">/</span>
          {% if crumb.url %}
            <a href="{{ crumb.url }}">{{ crumb.label }}</a>
          {% else %}
            <span class="bc-current">{{ crumb.label }}</span>
          {% endif %}
        {% endfor %}
      </div>
    </div>
    {% endif %}

    <main class="container">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <span>© 2026 arseniy</span>
        <a href="https://github.com/Arseniy404" target="_blank" rel="noopener">github ↗</a>
      </div>
    </footer>
  </body>
</html>
