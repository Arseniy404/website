{% extends "base.html" %}
{% set active = 'blog' %}

{% block title %}{{ post.title }} — arseniy{% endblock %}
{% block description %}{{ post.description }}{% endblock %}

{% block content %}
<article>
  <header class="post-header">
    <a href="/blog" class="back">← back to blog</a>
    <h1>{{ post.title }}</h1>
    <time>{{ post.date.strftime('%B %d, %Y') }}</time>
  </header>
  <div class="prose">
    {{ body_html | safe }}
  </div>
</article>
{% endblock %}
